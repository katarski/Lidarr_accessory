# EXAMPLE config. Copy to config.yaml (local) or the container's
# /config/config.yaml and fill in secrets. Never commit real keys.

watch:
  root: /downloads
  stable_seconds: 1
  audio_extensions:
  - .flac
  - .ape
  - .wv
  - .wav
  - .m4a
  - .alac
  - .aiff
  - .aif
  - .tak
  - .tta
  - .dsf
  - .dff
  - .mp3
  - .ogg
  - .opus
  - .wma
  - .shn
  exclude_dirs:
  - torrents
  observer: polling
  poll_interval_seconds: 15
  sweep_cueless_pre_split: true
  sweep_interval_seconds: 60
  sweep_min_stable_seconds: 10
staging:
  mode: in_place
  root: /downloads
  lidarr_grace_seconds: 90
  album_folder_template: '{album} ({year})'
  filename_template: '{artist} - {album} - {number:02d} - {title}.{ext}'
  delete_originals_on_success: true
  delete_source_folder_on_success: true
  delete_cue_if_pre_split: true
  ledger_file: /config/ledger.csv
  heartbeat_seconds: 640
ffmpeg:
  binary: ffmpeg
  flac_compression_level: 8
  extra_args: []
lidarr:
  base_url: http://192.168.1.200:8686
  api_key: YOUR_LIDARR_API_KEY
  library_root_lidarr: /music/Music
  library_root_windows: /music/Music
  path_mapping:
    from: /downloads
    to: /downloads
  min_match_percent: 40
  cleanup_lidarr_queue: true
  manual_import_timeout_seconds: 300
  pre_check_library: true
  # Discography decision logic ("fill monitored gaps only"). For messy grabs
  # (a whole artist discography: studio + compilations + live + best-of + many
  # editions), only hand a pre-split folder to Lidarr if it maps to an album
  # Lidarr MONITORS and is INCOMPLETE. Already-complete albums are skipped as
  # redundant; folders with no monitored target (comps/live/best-of your
  # metadata profile excludes) are skipped cleanly instead of being handed to
  # Lidarr, rejected, and left thrashing on disk. When several editions of the
  # same album are present, the one whose track count is closest to Lidarr's
  # release is kept and the rest skipped. Set false to attempt every folder.
  pre_split_monitored_gap_only: true
  # DTS-CD support: a DTS audio CD rips to raw .dts surround streams (no tags,
  # no cue) that Lidarr can't ingest. When true, the cueless sweep transcodes
  # each .dts to a channel-preserving (5.1) FLAC, tags it (track/title from the
  # filename; artist/album from the folder name, LLM-assisted when there's no
  # 'Artist - Album' separator), then imports the FLACs normally. Needs ffmpeg
  # (already in the image). Set false to ignore .dts folders.
  transcode_dts_cd: true
  # Uniform-FLAC library: re-encode pre-split lossless-but-not-FLAC tracks
  # (.ape/.wv/.wav/.aiff/.tak/.tta/.shn and ALAC-in-.m4a) to FLAC before import,
  # preserving tags, bit depth and sample rate (a lossless transcode). FLAC is
  # left as-is; LOSSY files (mp3/aac/ogg/opus/wma) are never touched, and DSD is
  # left alone. Set false to import lossless files in their original format.
  transcode_lossless_to_flac: true
  force_import_on_count_match: true
  force_import_max_missing_percent: 10
  # Partial import: when a download matches a Lidarr album but is missing some
  # tracks, import the matching ones anyway (album stays incomplete) instead of
  # skipping it. The source is KEPT -- never deleted -- unless everything landed
  # (only exact/superset imports delete). Must cover >= partial_min_percent of
  # the release, so one disc of a box set isn't crammed in.
  force_import_partial: true
  force_import_partial_min_percent: 50
  force_import_max_extra_percent: 25
  strict_import_only: true
  wait_for_lidarr: true
  availability_wait_seconds: -1
  verify_library_after_import: true
  verify_timeout_seconds: 60
  library_audit_enabled: false
  library_audit_on_startup: false
  library_audit_interval_seconds: 1300
  library_audit_skip_unchanged: true
  library_audit_report_file: /config/library_audit.csv
  # Queue reaper: clear fully-downloaded-but-stuck torrents (compilations,
  # unmatched grabs, title mismatches Lidarr won't import) from the queue.
  # Lidarr's native cleanup only reaps SUCCESSFUL imports, so at mass-import
  # scale these pile up. Only acts once a torrent is finished AND has been
  # stuck for grace minutes; never touches a still-downloading torrent.
  queue_reaper_enabled: false
  queue_reaper_interval_seconds: 600
  queue_reaper_grace_minutes: 30
  # Also delete the torrent + data from qBittorrent (needed for the reap to
  # stick). WARNING: stops seeding -- hit-and-run risk on private trackers.
  queue_reaper_remove_from_client: true
  queue_reaper_blocklist: false
  # queue_reaper_state_file: /config/queue_reaper.json   # default: next to ledger
  # Purge-imported sweep: the CONTINUOUS form of pre_check_library. On a
  # schedule, delete any download folder whose album Lidarr ALREADY has fully.
  # The process-time pre-check only fires when the pipeline (re)processes a
  # folder, so a re-download skipped via the in-memory _skip_seen set is never
  # re-examined until a restart -- redundant copies pile up. This sweep closes
  # that gap. Safe by design: only the fully-in-library category is removed;
  # partial / unmatched / video / disc-subfolders are never touched, a
  # LARGER edition is never deleted against a smaller complete album, and any
  # folder written to within min_stable_seconds (an in-flight download/import)
  # is skipped. Uses the same exact (non-fuzzy) title match as the pipeline.
  purge_imported_enabled: false
  purge_imported_interval_seconds: 1800
  # DRY RUN by default -- it only LOGS what it would delete. Watch a few passes,
  # then set this false to actually reclaim the space.
  purge_imported_dry_run: true
  purge_imported_min_stable_seconds: 300
ollama:
  base_url: https://generativelanguage.googleapis.com/v1beta/openai
  model: gemini-2.0-flash
  timeout_seconds: 300
  keep_alive: 30m
  num_ctx: 8192
  warmup_on_start: true
  enabled: true
  provider: openai
  api_key: ''
logging:
  level: INFO
  file: /config/pipeline.log
  max_bytes: 5242880
  backup_count: 3
qbittorrent:
  base_url: http://192.168.1.200:8080
  username: ''
  password: ''
  category: ''
  auto_deselect: false
  # Poll cadence (min 10s). Low = a newly-added torrent is caught almost
  # immediately, before bandwidth leaks on albums you already own.
  interval_seconds: 30
  # Pause a freshly-seen torrent the instant it's noticed, deselect owned
  # albums, then resume -- so a .torrent add never downloads the unwanted
  # albums at all. false = deselect without pausing (a little may leak).
  pause_during_scan: true
  # Completed-torrent lifecycle: for each finished music torrent, pause it while
  # the pipeline is mid-import and remove it (with data) once every album has
  # been moved into the library. Disk-aware, so it never deletes un-imported
  # files. Supersedes the time-based lidarr.queue_reaper_* when on.
  manage_completed: true
acoustid:
  # Acoustic-fingerprint identification (Chromaprint/fpcalc -> AcoustID ->
  # MusicBrainz). Fallback used at import time when a pre-split folder's TAGS
  # can't identify it -- recovers the real artist/album from the audio so it
  # can still be imported. Best-effort; throttled to ~3 req/s, never fatal.
  # Needs fpcalc in the image (libchromaprint-tools) + a free AcoustID app key
  # from https://acoustid.org/new-application.
  enabled: false
  api_key: ''
  max_rps: 3
  timeout_seconds: 20
